name = "Heta"
grammar = "heta"
path_suffixes = ["heta"]
line_comments = ["// "]
tab_size = 2
hard_tabs = false

autoclose_before = ",;:)]}"

brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["comment", "string"] },
  { start = "'", end = "'", close = true, newline = false, not_in = ["comment", "string"] },
]

